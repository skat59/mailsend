name: рЯПівАНвШ†пЄП –Ю—В–њ—А–∞–≤–Ї–∞
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
        Name:
            description: рЯПЧпЄП –Ю—В–њ—А–∞–≤–Ї–∞ –љ–∞ —Б–∞–є—В
            required: true
            default: 'рЯПЧпЄП –Ю—В–њ—А–∞–≤–Ї–∞ –љ–∞ —Б–∞–є—В'
jobs:
  build:
    name: рЯОЙ –†–∞–Ј–≤—С—А—В—Л–≤–∞–љ–Є–µ
    runs-on: ubuntu-latest
    steps:
    - name: рЯЪЪ –Я–Њ–ї—Г—З–Є—В—М –њ–Њ—Б–ї–µ–і–љ–Є–є –Ї–Њ–і
      uses: actions/checkout@v4
    
    - name: рЯУВ –Ч–∞–ї–Є–≤–Ї–∞ —Д–∞–є–ї–Њ–≤
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /
        local-dir: ./site/
        state-name: .status.json
    - name: рЯТѓ –£–і–∞–ї—П–µ–Љ —Б—В–∞—В—Г—Б —Д–∞–є–ї –Є –Ї—Н—И —Б–∞–є—В–∞
      uses: StephanThierry/ftp-delete-action@v2.1
      with:
        host: ${{ secrets.FTP_SERVER }}
        user: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        remoteFiles: ".status.json;assets/cache/docid_*.php"
        workingDir: /
        ignoreSSL: 1
