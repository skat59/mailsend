name: Новости компании
on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Pull README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.skat59.ru/rss.xml"
          readme_path: "./README.md"
          max_post_count: 40
          commit_message: Обновление RSS в README
          committer_username: ProjectSoft-STUDIONIONS
          committer_email: projectsoft2009@yandex.ru
          output_only: true
          